services:
  dozzle:
    image: amir20/dozzle:latest
    container_name: dozzle
    restart: unless-stopped
    ports:
      - "8081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /opt/data/dozzle/data:/data
    networks:
      - homelab_shared
    dns:
      - 192.168.10.1
networks:
  homelab_shared:
    external: true
