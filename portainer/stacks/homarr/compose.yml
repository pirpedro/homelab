services:
  homarr:
    image: ghcr.io/homarr-labs/homarr:latest
    container_name: homarr
    restart: unless-stopped
    ports:
      - "7575:7575"
    env_file:
      - /opt/stacks-runtime/homarr/.env
    volumes:
      - /opt/data/homarr/appdata:/appdata
      - /var/run/docker.sock:/var/run/docker.sock:ro
